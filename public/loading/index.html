<!DOCTYPE html>
<html lang="zh">
<head>
    <link rel="preload" href="/DMSans-Regular.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="/loading/Tsukushi-Mincho-loader-subset.ttf" as="font" type="font/ttf" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载动画 - 独立演示</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. 极简、高质感全屏加载动画遮罩层 -->
    <div id="preloader-overlay" class="preloader-overlay">
        <div class="preloader-container">
            <!-- 2x2 字符网格 -->
            <div class="letter-grid">
                <!-- 单元格 1 -->
                <div class="grid-cell" id="cell-0"></div>
                <!-- 单元格 2 -->
                <div class="grid-cell" id="cell-1"></div>
                <!-- 单元格 3 -->
                <div class="grid-cell" id="cell-2"></div>
                <!-- 单元格 4 -->
                <div class="grid-cell" id="cell-3"></div>
            </div>
        </div>
    </div>



    <!-- 导入控制时间轴和动画逻辑的脚本 -->
    <script src="script.js"></script>
</body>
</html>
